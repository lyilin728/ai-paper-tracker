name: Hourly Paper Fetch

on:
  schedule:
    # Runs every hour at minute 5
    - cron: "5 * * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  fetch-papers:
    name: Fetch & Notify New Papers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger paper fetch
        run: |
          echo "Triggering paper fetch at $(date -u)"
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the job if HTTP status is not 2xx
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "❌ Cron trigger failed with status $response"
            exit 1
          fi

          echo "✅ Cron trigger succeeded"
